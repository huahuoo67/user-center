services:
  backend:
    build:
      context: ./user-center-backend
    container_name: user-center-backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "8080"

  frontend:
    build:
      context: ./user-center-frontend-vue
    container_name: user-center-frontend
    restart: always
    depends_on:
      - backend
    ports:
      # 先使用 8081，避免和宝塔现有 80 端口冲突；确认无误后可改为 "80:80"。
      - "8081:80"
