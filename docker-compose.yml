services:
  backend:
    build:
      context: ./user-center-backend
    container_name: user-center-backend
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_URL: ${MYSQL_URL}
      MYSQL_USERNAME: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ADMIN_ENABLED: ${ADMIN_ENABLED:-true}
      ADMIN_ACCOUNT: ${ADMIN_ACCOUNT:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?请在项目根目录的 .env 中设置 ADMIN_PASSWORD}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./user-center-frontend-vue
    container_name: user-center-frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 先使用 8081，避免和宝塔现有 80 端口冲突；确认无误后可改为 "80:80"。
      - "8081:80"
