spring:
  datasource:
    url: jdbc:mysql://localhost:3306/user_center?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
app:
  admin:
    enabled: ${ADMIN_ENABLED:false}
    account: ${ADMIN_ACCOUNT:admin}
    password: ${ADMIN_PASSWORD:}
